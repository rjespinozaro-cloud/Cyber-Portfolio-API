<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Portfolio | rjespinozaro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41; /* Verde Matrix */
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary);
            width: 100%;
            max-width: 800px;
        }

        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 5px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.1);
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 255, 65, 0.3);
        }

        .card h2 { margin-top: 0; color: var(--primary); font-size: 1.2rem; }
        
        .btn {
            display: inline-block;
            margin-top: 10px;
            color: var(--bg);
            background: var(--primary);
            padding: 8px 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
        }

        #status { color: #888; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>🛡️ Red Team Portfolio</h1>
        <p>Auditorías de Infraestructura & Seguridad de APIs</p>
    </header>

    <div class="container" id="portfolio-content">
        <div class="card">
            <h2>Cargando módulos de seguridad...</h2>
        </div>
    </div>

    <p id="status">Conectado a GitHub API v3</p>

    <script>
        // "Backend" en JS para leer tu repo
        const username = 'rjespinozaro-cloud';
        const repo = 'Cyber-Portfolio-API';
        const container = document.getElementById('portfolio-content');

        async function loadRepo() {
            try {
                // Llamada a la API de GitHub para ver las carpetas
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const data = await response.json();

                container.innerHTML = ''; // Limpiar cargando

                data.forEach(item => {
                    // Solo mostrar carpetas que empiecen con números (tus dominios)
                    if (item.type === 'dir' && /^\d/.test(item.name)) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <h2>Módulo: ${item.name.replace(/-/g, ' ')}</h2>
                            <p>Documentación técnica y hallazgos.</p>
                            <a href="https://github.com/${username}/${repo}/tree/main/${item.name}" class="btn" target="_blank">Explorar Directorio</a>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                container.innerHTML = '<p>Error al conectar con el backend de GitHub.</p>';
            }
        }

        loadRepo();
    </script>
</body>
</html>
